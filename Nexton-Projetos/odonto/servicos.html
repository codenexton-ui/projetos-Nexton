<section class="servicos fade-in">
<h1>Serviços Exclusivos</h1>
<div class="cards">
<div class="card">
<h3>Implantes Premium</h3>
<p>Tecnologia digital 3D e máxima precisão.</p>
</div>
<div class="card">
<h3>Lentes de Contato Dental</h3>
<p>Estética natural e sofisticada.</p>
</div>
<div class="card">
<h3>Clareamento VIP</h3>
<p>Procedimentos rápidos e seguros.</p>
</div>
</div>
</section>

<section id="agendamento" class="agendamento fade-in">
<h2>Agende sua Experiência</h2>
<form id="formLuxo">
<input type="text" id="nome" placeholder="Nome completo" required>
<input type="tel" id="telefone" placeholder="Telefone" required>
<input type="date" id="data" required>
<select id="servico" required>
<option value="">Selecione o serviço</option>
<option>Implante Premium</option>
<option>Lente de Contato Dental</option>
<option>Clareamento VIP</option>
</select>
<button type="submit">Confirmar Agendamento</button>
</form>
</section>

<footer>
<p>Atendimento exclusivo sob agendamento</p>
</footer>
